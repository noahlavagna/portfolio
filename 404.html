<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable · Noah Lavagna</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css?v=24">
  <link rel="stylesheet" href="/modern.css?v=27">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@400;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 40px;
      padding: 40px 20px;
      text-align: center;
      position: relative;
    }
    .nf-vinyl {
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #c44d2b 0 14%, #1a1a1a 14% 32%, #2a2a2a 32% 33%, #1a1a1a 33% 50%, #2a2a2a 50% 51%, #1a1a1a 51% 70%, #2a2a2a 70% 71%, #1a1a1a 71% 100%);
      box-shadow: 0 30px 60px rgba(0,0,0,.3), inset 0 0 0 4px rgba(0,0,0,.5);
      animation: nf-skip 1.6s cubic-bezier(.7,0,.3,1) infinite;
      position: relative;
    }
    .nf-vinyl::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 16px; height: 16px;
      background: #f8f3ec;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes nf-skip {
      0%, 60%, 100% { transform: rotate(0deg); }
      65% { transform: rotate(-8deg); }
      70% { transform: rotate(0deg); }
      75% { transform: rotate(-6deg); }
      80% { transform: rotate(0deg); }
    }
    .nf-code {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: clamp(7rem, 22vw, 15rem);
      line-height: .85;
      color: var(--accent, #c44d2b);
      letter-spacing: -.04em;
      margin: 0;
    }
    .nf-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0;
    }
    .nf-desc {
      font-family: 'Inter', sans-serif;
      color: var(--text-light, #5a5549);
      max-width: 42ch;
      line-height: 1.6;
      margin: 0;
    }
    .nf-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--text, #1a1a1a);
      color: var(--cream, #f8f3ec);
      text-decoration: none;
      border-radius: 999px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .02em;
      transition: background .3s, transform .3s cubic-bezier(.22,1,.36,1);
    }
    .nf-back:hover { background: var(--accent, #c44d2b); transform: translateY(-2px); }
  </style>
  <script>
    // Marque les navigations internes (modern.css skip les anims d'entrée → évite double-anim sous View Transition)
    try {
      if (document.referrer && new URL(document.referrer).origin === location.origin) {
        document.documentElement.classList.add('mp-internal-nav');
      }
    } catch (e) {}
  </script>
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>
  <main class="nf-wrap">
    <div class="nf-vinyl" aria-hidden="true"></div>
    <h1 class="nf-code">404</h1>
    <h2 class="nf-title">Le vinyle a sauté.</h2>
    <p class="nf-desc">Cette page n'existe pas — ou plus. Mais le reste du portfolio tourne toujours.</p>
    <a href="/" class="nf-back">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
  </main>
  <script src="/modern.js?v=7" defer></script>
</body>
</html>
